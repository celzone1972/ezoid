<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EZOID</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f8ff;
    }

    header {
      background: linear-gradient(135deg, #1e88e5, #42a5f5);
      color: white;
      text-align: center;
      padding: 20px;
      position: relative;
    }

    header h2 {
      font-size: 34px;
      margin: 0;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .visitor {
      position: absolute;
      right: 10px;
      top: 10px;
      background: rgba(255,255,255,0.2);
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.4;
    }

    .hero {
      text-align: center;
      padding: 50px 20px;
    }

    .btn {
      background: #25D366;
      color: white;
      padding: 12px 18px;
      text-decoration: none;
      border-radius: 8px;
      display: inline-block;
      margin-top: 10px;
    }

    .card {
      background: white;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .wa {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 12px;
      border-radius: 50px;
      text-decoration: none;
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>

<body>

<header>
  <h2>EZOID</h2>

  <div class="visitor">
    Visitor Today: <span id="visitor-count">0</span><br>
    WA Today: <span id="wa-count">0</span>
  </div>
</header>

<div class="hero">
  <h1>Belajar Bahasa Inggris Modern</h1>
  <p>Fokus Speaking & Karir</p>
  <a class="btn" href="https://wa.me/6287770055999" onclick="trackWA()">Daftar WhatsApp</a>
</div>

<div class="card">Speaking Confidence</div>
<div class="card">Business English</div>
<div class="card">Private Class</div>

<a class="wa" href="https://wa.me/6287770055999" onclick="trackWA()">
  WhatsApp
</a>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAtWHWo_KZptjHYxV2NDhQHb4zBpbXYyyA",
    authDomain: "ezoid-8328d.firebaseapp.com",
    databaseURL: "https://ezoid-8328d-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ezoid-8328d",
    storageBucket: "ezoid-8328d.firebasestorage.app",
    messagingSenderId: "889301644842",
    appId: "1:889301644842:web:c86467b84db01d904c7553"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const ONE_DAY = 24 * 60 * 60 * 1000;

  // =========================
  // VISITOR 24 JAM
  // =========================
  function handleVisitor() {
    const key = "ezoid_visit_24h";
    const now = Date.now();
    const last = localStorage.getItem(key);

    if (!last || (now - last > ONE_DAY)) {
      db.ref("visitors").transaction((cur) => (cur || 0) + 1);
      localStorage.setItem(key, now);
    }
  }

  // =========================
  // WA CLICK 24 JAM
  // =========================
  function trackWA() {
    const key = "ezoid_wa_24h";
    const now = Date.now();
    const last = localStorage.getItem(key);

    if (!last || (now - last > ONE_DAY)) {
      db.ref("whatsapp_clicks").transaction((cur) => (cur || 0) + 1);
      localStorage.setItem(key, now);
    }
  }

  // =========================
  // REALTIME DISPLAY
  // =========================
  db.ref("visitors").on("value", (snap) => {
    document.getElementById("visitor-count").innerText = snap.val() || 0;
  });

  db.ref("whatsapp_clicks").on("value", (snap) => {
    document.getElementById("wa-count").innerText = snap.val() || 0;
  });

  handleVisitor();
</script>

</body>
</html>
