<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EZOID - Kursus Bahasa Inggris Modern</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f8ff;
    }

    header {
      background: linear-gradient(135deg, #1e88e5, #42a5f5);
      color: white;
      text-align: center;
      padding: 20px;
      position: relative;
    }

    .visitor {
      position: absolute;
      right: 10px;
      top: 10px;
      background: rgba(255,255,255,0.2);
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
    }

    .hero {
      text-align: center;
      padding: 50px 20px;
    }

    .btn {
      background: #25D366;
      color: white;
      padding: 12px 18px;
      text-decoration: none;
      border-radius: 8px;
      display: inline-block;
      margin-top: 10px;
    }

    .card {
      background: white;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .wa {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 12px;
      border-radius: 50px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  <h2>EZOID</h2>

  <div class="visitor">
    Pengunjung: <span id="visitor-count">0</span>
  </div>
</header>

<div class="hero">
  <h1>Belajar Bahasa Inggris Modern</h1>
  <p>Fokus Speaking & Karir</p>
  <a class="btn" href="https://wa.me/6287770055999">Daftar WhatsApp</a>

<div class="card">Speaking Confidence</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // CONFIG FIREBASE KAMU
  const firebaseConfig = {
    apiKey: "AIzaSyAtWHWo_KZptjHYxV2NDhQHb4zBpbXYyyA",
    authDomain: "ezoid-8328d.firebaseapp.com",

  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const visitorRef = db.ref("visitors");

  // tambah 1 setiap orang buka website
  visitorRef.transaction((current) => {
    return (current || 0) + 1;
  });

  // realtime update
  visitorRef.on("value", (snapshot) => {
    document.getElementById("visitor-count").innerText = snapshot.val();
  });
</script>
